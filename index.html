<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Management & RSVP System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #f8f9fa; 
      color: #1a1a1a; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .header { 
      background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
      color: white;
      text-align: center; 
      margin: -20px -20px 30px -20px;
      padding: 40px 20px;
      border-radius: 0 0 12px 12px;
    }
    .header h1 { font-size: 28px; margin-bottom: 10px; font-weight: 700; }
    .header p { font-size: 13px; opacity: 0.9; }
    
    .role-switch {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 15px;
    }
    
    .card { 
      background: white; 
      border: 1px solid #e0e0e0;
      padding: 25px; 
      margin-bottom: 20px; 
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card h2 { 
      font-size: 18px; 
      color: #0066cc; 
      margin-bottom: 20px; 
      padding-bottom: 12px; 
      border-bottom: 2px solid #e8f0ff;
    }
    .card h3 {
      font-size: 15px;
      color: #333;
      margin-top: 20px;
      margin-bottom: 12px;
      font-weight: 600;
    }
    
    .form-group { margin-bottom: 16px; }
    .form-group label { 
      display: block; 
      font-size: 13px; 
      color: #333;
      margin-bottom: 8px; 
      font-weight: 600;
    }
    .form-group input, .form-group select { 
      width: 100%; 
      padding: 11px 14px; 
      background: #f8f9fa; 
      border: 1.5px solid #d0d8e0; 
      color: #1a1a1a; 
      font-size: 14px; 
      border-radius: 6px;
    }
    .form-group input:focus, .form-group select:focus { 
      outline: none; 
      border-color: #0066cc;
      background: white;
    }
    
    .btn { 
      padding: 12px 20px; 
      background: #0066cc; 
      color: white; 
      border: none; 
      cursor: pointer; 
      font-weight: 600; 
      border-radius: 6px; 
      font-size: 14px;
    }
    .btn:hover { background: #0052a3; }
    
    .btn-secondary { 
      background: white; 
      border: 1.5px solid #0066cc; 
      color: #0066cc;
    }
    .btn-secondary:hover { background: #e8f0ff; }
    
    .btn-small { padding: 8px 12px; font-size: 12px; }
    .btn-danger { background: #f44336; }
    .btn-success { background: #4caf50; }
    
    .tabs { 
      display: flex; 
      gap: 5px; 
      margin-bottom: 20px; 
      border-bottom: 2px solid #e0e0e0;
      overflow-x: auto;
    }
    .tabs button { 
      background: none; 
      border: none; 
      padding: 12px 16px; 
      color: #666; 
      cursor: pointer; 
      font-size: 13px; 
      font-weight: 600;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
    }
    .tabs button.active { 
      color: #0066cc; 
      border-bottom-color: #0066cc;
    }
    
    .hidden { display: none !important; }
    
    .alert { 
      padding: 14px 16px; 
      border-radius: 6px; 
      margin-bottom: 16px; 
      font-size: 14px;
      border-left: 4px solid;
    }
    .alert-success { 
      background: #e8f5e9; 
      color: #2e7d32;
      border-left-color: #4caf50;
    }
    .alert-warning {
      background: #fff3e0;
      color: #e65100;
      border-left-color: #ff9800;
    }
    
    .event-card {
      background: #e8f0ff;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 12px;
      border-left: 4px solid #0066cc;
      cursor: pointer;
    }
    .event-card:hover { background: #d1e0ff; }
    .event-card h4 { color: #0066cc; margin-bottom: 4px; }
    .event-card p { font-size: 12px; color: #666; }
    
    .setting-item {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .qr-container { 
      text-align: center; 
      margin: 25px 0;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .qr-container img { max-width: 200px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Event Management & RSVP System</h1>
      <p>Complete event management, RSVP, and check-in solution</p>
      <div class="role-switch">
        <button class="btn btn-small" onclick="switchRole('attendee')" id="roleAttendee">📝 Attendee</button>
        <button class="btn-secondary btn btn-small" onclick="switchRole('admin')" id="roleAdmin">⚙️ Admin</button>
      </div>
    </div>

    <!-- ATTENDEE VIEW -->
    <div id="attendeeView">
      <div id="resetBanner" class="card" style="background: #fff3e0; border-left: 4px solid #ff9800; display: none;">
        <h3 style="color: #e65100; margin-top: 0;">⚠️ No Events Available</h3>
        <p style="color: #666; font-size: 13px; margin-bottom: 16px;">Click below to load a demo event!</p>
        <button class="btn" onclick="resetDemoData()" style="width: 100%; background: #ff9800;">🔄 Load Demo Event</button>
      </div>

      <div id="eventSelectionStep" class="card">
        <h2>Select Event</h2>
        <p style="color: #666; margin-bottom: 20px; font-size: 13px;">Choose an event:</p>
        <div id="eventList"></div>
      </div>

      <div id="rsvpFormStep" class="card hidden">
        <h2>RSVP</h2>
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="phone" placeholder="(xxx) xxx-xxxx">
        </div>
        <div class="form-group">
          <label>Will you attend?</label>
          <select id="attend">
            <option value="">Select...</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button class="btn" onclick="submitRsvp()">Submit</button>
          <button class="btn btn-secondary" onclick="backToEvents()">Back</button>
        </div>
      </div>

      <div id="confirmationStep" class="card hidden">
        <div class="alert alert-success">✓ RSVP Submitted!</div>
        <div id="confirmSummary" style="background: #e8f5e9; padding: 16px; border-radius: 6px; margin-bottom: 20px;"></div>
        <div class="qr-container">
          <img id="confirmQR" src="" alt="QR">
        </div>
        <div style="display: flex; gap: 10px;">
          <button class="btn" onclick="downloadQR()" style="flex: 1;">⬇ Download QR</button>
          <button class="btn btn-secondary" onclick="backToEvents()" style="flex: 1;">← Back</button>
        </div>
      </div>
    </div>

    <!-- ADMIN VIEW -->
    <div id="adminView" class="hidden">
      <div class="tabs">
        <button class="active" onclick="switchAdminTab('events')">Create Event</button>
        <button onclick="switchAdminTab('eventsList')">Events</button>
        <button onclick="switchAdminTab('members')">Members</button>
        <button onclick="switchAdminTab('checkin')">Check-In</button>
      </div>

      <div id="eventsTab" class="card">
        <h2>Create Event</h2>
        <div class="alert alert-warning">First time? Click "Reset Demo Data" below</div>
        <div class="form-group">
          <label>Event Name</label>
          <input type="text" id="eventName" placeholder="Name">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="eventDate">
        </div>
        <div class="form-group">
          <label>Venue</label>
          <input type="text" id="eventVenue" placeholder="Location">
        </div>
        <label style="display: flex; gap: 10px; margin-bottom: 20px; cursor: pointer;">
          <input type="checkbox" id="rsvpEnabled" checked style="width: auto;">
          <span>Enable RSVP</span>
        </label>
        <div style="display: flex; gap: 10px;">
          <button class="btn" onclick="createEvent()" style="flex: 1;">Save Event</button>
          <button class="btn btn-secondary" onclick="resetDemoData()" style="flex: 1;">Reset Demo</button>
        </div>
      </div>

      <div id="eventsListTab" class="card hidden">
        <h2>Events</h2>
        <div id="eventsList"></div>
      </div>

      <div id="membersTab" class="card hidden">
        <h2>Members</h2>
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="memberName" placeholder="Name">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="memberPhone" placeholder="Phone">
        </div>
        <button class="btn" onclick="addMember()" style="margin-bottom: 20px;">Add</button>
        <div id="membersList"></div>
      </div>

      <div id="checkinTab" class="card hidden">
        <h2>Check-In</h2>
        <div id="checkinList"></div>
      </div>
    </div>
  </div>

  <script>
    const DB = {
      events: [],
      rsvps: [],
      members: [],
      load() {
        this.events = JSON.parse(localStorage.getItem('events') || '[]');
        this.rsvps = JSON.parse(localStorage.getItem('rsvps') || '[]');
        this.members = JSON.parse(localStorage.getItem('members') || '[]');
      },
      save() {
        localStorage.setItem('events', JSON.stringify(this.events));
        localStorage.setItem('rsvps', JSON.stringify(this.rsvps));
        localStorage.setItem('members', JSON.stringify(this.members));
      }
    };

    let currentRole = 'attendee';
    let selectedEvent = null;

    window.addEventListener('DOMContentLoaded', () => {
      DB.load();
      if (DB.events.length === 0) {
        DB.events.push({
          id: 'E' + Date.now(),
          name: 'Ambedkar Jayanti 2026',
          date: '2026-04-14',
          venue: 'Community Hall, NJ',
          rsvpEnabled: true
        });
      }
      if (DB.members.length === 0) {
        DB.members = [
          {id: 'M1', name: 'Ahmed Khan', phone: '(551) 268-8625'},
          {id: 'M2', name: 'Priya Singh', phone: '(917) 935-3344'},
          {id: 'M3', name: 'Nilesh Meshram', phone: '(917) 868-7028'},
        ];
      }
      DB.save();
      loadAttendeeView();
    });

    function switchRole(role) {
      currentRole = role;
      document.getElementById('attendeeView').classList.toggle('hidden', role !== 'attendee');
      document.getElementById('adminView').classList.toggle('hidden', role !== 'admin');
      document.getElementById('roleAttendee').classList.toggle('btn-secondary', role !== 'attendee');
      document.getElementById('roleAdmin').classList.toggle('btn-secondary', role !== 'admin');
      if (role === 'admin') loadEventsList();
    }

    function switchAdminTab(tab) {
      document.querySelectorAll('[id$="Tab"]').forEach(el => el.classList.add('hidden'));
      document.getElementById(tab + 'Tab').classList.remove('hidden');
      document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      if (tab === 'eventsList') loadEventsList();
      if (tab === 'members') loadMembersList();
      if (tab === 'checkin') loadCheckinList();
    }

    function resetDemoData() {
      if (!confirm('Reset?')) return;
      localStorage.clear();
      DB.events = [{id: 'E' + Date.now(), name: 'Ambedkar Jayanti 2026', date: '2026-04-14', venue: 'Community Hall, NJ', rsvpEnabled: true}];
      DB.members = [{id: 'M1', name: 'Ahmed Khan', phone: '(551) 268-8625'}, {id: 'M2', name: 'Priya Singh', phone: '(917) 935-3344'}, {id: 'M3', name: 'Nilesh Meshram', phone: '(917) 868-7028'}];
      DB.rsvps = [];
      DB.save();
      switchRole('attendee');
      loadAttendeeView();
    }

    function loadAttendeeView() {
      const events = DB.events.filter(e => e.rsvpEnabled);
      const html = events.map(e => `<div class="event-card" onclick="selectEvent('${e.id}')"><h4>${e.name}</h4><p>📅 ${e.date} | 📍 ${e.venue}</p></div>`).join('');
      document.getElementById('eventList').innerHTML = html;
      document.getElementById('resetBanner').style.display = events.length === 0 ? 'block' : 'none';
    }

    function selectEvent(id) {
      selectedEvent = DB.events.find(e => e.id === id);
      document.getElementById('eventSelectionStep').classList.add('hidden');
      document.getElementById('rsvpFormStep').classList.remove('hidden');
    }

    function submitRsvp() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const attend = document.getElementById('attend').value;
      if (!name || !phone || !attend) { alert('Fill all'); return; }
      DB.rsvps.push({id: 'R' + Date.now(), name, phone, attend, eventId: selectedEvent.id});
      DB.save();
      const qr = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${DB.rsvps[DB.rsvps.length-1].id}`;
      document.getElementById('confirmQR').src = qr;
      document.getElementById('confirmQR').dataset.url = qr;
      document.getElementById('confirmSummary').innerHTML = `<strong>${name}</strong><br>${phone}`;
      document.getElementById('rsvpFormStep').classList.add('hidden');
      document.getElementById('confirmationStep').classList.remove('hidden');
    }

    function downloadQR() {
      const url = document.getElementById('confirmQR').dataset.url.replace('300x300', '500x500');
      const a = document.createElement('a');
      a.href = url;
      a.download = 'QR.png';
      a.click();
    }

    function backToEvents() {
      document.getElementById('eventSelectionStep').classList.remove('hidden');
      document.getElementById('rsvpFormStep').classList.add('hidden');
      document.getElementById('confirmationStep').classList.add('hidden');
      document.getElementById('name').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('attend').value = '';
    }

    function createEvent() {
      const name = document.getElementById('eventName').value.trim();
      const date = document.getElementById('eventDate').value;
      const venue = document.getElementById('eventVenue').value.trim();
      if (!name || !date) { alert('Fill all'); return; }
      DB.events.push({id: 'E' + Date.now(), name, date, venue, rsvpEnabled: document.getElementById('rsvpEnabled').checked});
      DB.save();
      alert('✓ Event created!');
      document.getElementById('eventName').value = '';
      document.getElementById('eventDate').value = '';
      document.getElementById('eventVenue').value = '';
      loadEventsList();
    }

    function loadEventsList() {
      const html = DB.events.map(e => `<div class="setting-item"><div><strong>${e.name}</strong><br><span style="font-size:12px;color:#666">${e.date}</span></div><button class="btn btn-small btn-danger" onclick="deleteEvent('${e.id}')">Delete</button></div>`).join('');
      document.getElementById('eventsList').innerHTML = html;
    }

    function deleteEvent(id) {
      if (!confirm('Delete?')) return;
      DB.events = DB.events.filter(e => e.id !== id);
      DB.save();
      loadEventsList();
    }

    function addMember() {
      const name = document.getElementById('memberName').value.trim();
      const phone = document.getElementById('memberPhone').value.trim();
      if (!name) { alert('Enter name'); return; }
      DB.members.push({id: 'M' + Date.now(), name, phone});
      DB.save();
      document.getElementById('memberName').value = '';
      document.getElementById('memberPhone').value = '';
      loadMembersList();
    }

    function loadMembersList() {
      const html = DB.members.map(m => `<div class="setting-item"><div><strong>${m.name}</strong><br><span style="font-size:12px;color:#666">${m.phone}</span></div><button class="btn btn-small btn-danger" onclick="deleteMember('${m.id}')">Delete</button></div>`).join('');
      document.getElementById('membersList').innerHTML = html;
    }

    function deleteMember(id) {
      if (!confirm('Delete?')) return;
      DB.members = DB.members.filter(m => m.id !== id);
      DB.save();
      loadMembersList();
    }

    function loadCheckinList() {
      const html = DB.rsvps.map(r => `<div class="setting-item"><div><strong>${r.name}</strong><br><span style="font-size:12px;color:#666">${r.phone}</span></div><button class="btn btn-small btn-success" onclick="checkIn('${r.id}')">✓</button></div>`).join('');
      document.getElementById('checkinList').innerHTML = html;
    }

    function checkIn(id) {
      alert('✓ Checked in!');
    }
  </script>
</body>
</html>
